<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tryout Shadcn for Birdeye — MYNA Automotive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- MYNA Automotive app styles -->
<link rel="stylesheet" crossorigin href="https://hareshrajamannar-creator.github.io/MYNA-Automotive/assets/index-BL302xn2.css">

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;min-height:100vh;background:#f0f2f5;}

  /* Nav bar */
  .nav{display:flex;align-items:center;gap:10px;padding:0 24px;height:52px;background:linear-gradient(90deg,#1565c0 0%,#1976d2 100%);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18);position:sticky;top:0;z-index:999;}
  .nav-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em;}
  .nav-tag{background:rgba(255,255,255,.15);color:#fff;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .nav-badge{background:#18181b;color:#fafafa;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .nav-divider{width:1px;height:20px;background:rgba(255,255,255,.25);margin:0 4px;}
  .back-btn{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);color:#fff;font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;text-decoration:none;border:1.5px solid rgba(255,255,255,.3);white-space:nowrap;transition:background .15s;}
  .back-btn:hover{background:rgba(255,255,255,.22);}

  /* App mount */
  #root{flex:1;}

  /* Change 2: Shadcn typography — Inter replaces Roboto (excludes icon font) */
  #root p, #root div, #root button, #root input,
  #root textarea, #root select, #root label, #root a,
  #root h1, #root h2, #root h3, #root h4, #root h5, #root h6, #root li {
    font-family: 'Inter', system-ui, sans-serif !important;
  }
  /* Restore Material Symbols on icon elements */
  #root .material-symbols-outlined,
  #root [class*="material-symbols"] {
    font-family: 'Material Symbols Outlined' !important;
    letter-spacing: normal !important;
  }

  /* Change 3: Shadcn border radius — 4px → 8px on inputs, buttons, cards */
  #root input, #root textarea, #root select {
    border-radius: 8px !important;
  }
  #root button {
    border-radius: 8px !important;
  }
  #root .canvas-node, #root .lhs-drawer__card,
  #root .tc-dropdown__menu, #root .cnh__context-menu {
    border-radius: 8px !important;
  }

  /* Change 4: Shadcn zinc surface & border colors */
  #root input, #root textarea, #root select {
    border-color: #e4e4e7 !important;
    background: #fff !important;
  }
  #root .lhs-drawer__card {
    border-color: #e4e4e7 !important;
  }

  /* Remove L1/L2 nav item separators */
  #root [class*="group/row"] {
    border-bottom: none !important;
  }

  /* Change 9: Shadcn text color — near-black #09090b */
  #root, #root p, #root div, #root span, #root label,
  #root h1, #root h2, #root h3, #root h4, #root h5, #root h6, #root li {
    color: #09090b;
  }

  /* Change 10: Shadcn tab active state — crisp 2px underline, no bg fill */
  #root .lhs-drawer__tab {
    border-bottom: 2px solid transparent !important;
    background: transparent !important;
    color: #71717a !important;
    border-radius: 0 !important;
  }
  #root .lhs-drawer__tab--active,
  #root .lhs-drawer__tab[data-active="true"] {
    border-bottom-color: #1976d2 !important;
    color: #09090b !important;
    background: transparent !important;
  }
  #root .lhs-drawer__tab-underline {
    display: none !important;
  }

  /* Change 11: Shadcn badge / chip style */
  #root [class*="badge"], #root [class*="chip"],
  #root .ab-view-badge {
    font-size: 11px !important;
    font-weight: 600 !important;
    padding: 2px 8px !important;
    border-radius: 6px !important;
    border: 1px solid #e4e4e7 !important;
    background: #fafafa !important;
    color: #09090b !important;
    letter-spacing: 0 !important;
  }
  #root .material-symbols-outlined,
  #root [class*="material-symbols"] {
    color: inherit;
  }

  /* Change 7: Shadcn spacing — looser padding on nav items, cards, drawers */
  #root .lhs-drawer__card,
  #root .lhs-drawer__trigger-group-header,
  #root .lhs-entity-group__item,
  #root .lhs-external-apps__item,
  #root .lhs-drawer__dropdown-item {
    padding: 8px 12px !important;
    height: auto !important;
    min-height: 40px !important;
    max-height: none !important;
  }
  #root .lhs-drawer {
    padding: 24px !important;
    gap: 16px !important;
  }
  #root .lhs-entity-group,
  #root .lhs-external-apps,
  #root .lhs-drawer__dropdown {
    padding: 20px 24px !important;
    gap: 12px !important;
  }
  #root .lhs-drawer__body {
    gap: 12px !important;
  }
  #root .tc-dropdown__option,
  #root .tc-connector__option,
  #root .cnh__context-menu-item {
    padding: 8px 12px !important;
  }

  /* Change 6: Shadcn input fields */
  #root input, #root textarea, #root select {
    height: 36px !important;
    padding: 0 12px !important;
    font-size: 14px !important;
    outline: none !important;
    transition: box-shadow .15s !important;
  }
  #root textarea {
    height: auto !important;
    padding: 8px 12px !important;
  }
  #root input:focus, #root textarea:focus, #root select:focus {
    border-color: #1976d2 !important;
    box-shadow: 0 0 0 3px rgba(25,118,210,.15) !important;
  }

  /* Change 5: Shadcn button style */
  #root button {
    font-weight: 500 !important;
    font-size: 14px !important;
    box-shadow: 0 1px 2px rgba(0,0,0,.05) !important;
    transition: opacity .15s, box-shadow .15s !important;
  }
  #root button:hover {
    opacity: 0.9 !important;
    box-shadow: 0 1px 4px rgba(0,0,0,.1) !important;
  }
</style>
</head>
<body>

<!-- Birdeye nav bar -->
<nav class="nav">
  <div class="nav-title">Shadcn for Birdeye</div>
  <span class="nav-tag">Live Prototype</span>
  <span class="nav-badge">MYNA · Automotive</span>
  <div class="nav-divider"></div>
  <a href="aero-foundations.html" class="back-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Go back to Components
  </a>
</nav>

<!-- MYNA Automotive React app -->
<div id="root"></div>

<!-- MYNA Automotive app bundle -->
<script type="module" crossorigin src="https://hareshrajamannar-creator.github.io/MYNA-Automotive/assets/index-BqQcQIrc.js"></script>

</body>
</html>
