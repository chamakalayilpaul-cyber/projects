<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tryout Shadcn for Birdeye — MYNA Automotive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- MYNA Automotive app styles -->
<link rel="stylesheet" crossorigin href="https://hareshrajamannar-creator.github.io/MYNA-Automotive/assets/index-BL302xn2.css">

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;min-height:100vh;background:#f0f2f5;}

  /* Nav bar */
  .nav{display:flex;align-items:center;gap:10px;padding:0 24px;height:52px;background:linear-gradient(90deg,#1565c0 0%,#1976d2 100%);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18);position:sticky;top:0;z-index:999;}
  .nav-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em;}
  .nav-tag{background:rgba(255,255,255,.15);color:#fff;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .nav-badge{background:#18181b;color:#fafafa;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .nav-divider{width:1px;height:20px;background:rgba(255,255,255,.25);margin:0 4px;}
  .back-btn{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);color:#fff;font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;text-decoration:none;border:1.5px solid rgba(255,255,255,.3);white-space:nowrap;transition:background .15s;}
  .back-btn:hover{background:rgba(255,255,255,.22);}

  /* Toggle */
  .ds-toggle{display:flex;align-items:center;background:rgba(0,0,0,.2);border-radius:8px;padding:3px;gap:2px;}
  .ds-toggle-btn{font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:600;padding:4px 12px;border-radius:6px;border:none;cursor:pointer;transition:background .15s,color .15s;background:transparent;color:rgba(255,255,255,.65);}
  .ds-toggle-btn.active{background:#fff;color:#1565c0;}

  /* App mount */
  #root{flex:1;}

  /* ── Shadcn overrides (only active when #root has class "shadcn") ── */

  /* Typography */
  #root.shadcn p, #root.shadcn div, #root.shadcn button, #root.shadcn input,
  #root.shadcn textarea, #root.shadcn select, #root.shadcn label, #root.shadcn a,
  #root.shadcn h1, #root.shadcn h2, #root.shadcn h3, #root.shadcn h4,
  #root.shadcn h5, #root.shadcn h6, #root.shadcn li {
    font-family: 'Inter', system-ui, sans-serif !important;
  }
  #root.shadcn .material-symbols-outlined,
  #root.shadcn [class*="material-symbols"] {
    font-family: 'Material Symbols Outlined' !important;
    letter-spacing: normal !important;
  }

  /* Border radius */
  #root.shadcn input, #root.shadcn textarea, #root.shadcn select,
  #root.shadcn button {
    border-radius: 8px !important;
  }

  /* Text color */
  #root.shadcn p, #root.shadcn div, #root.shadcn span, #root.shadcn label,
  #root.shadcn h1, #root.shadcn h2, #root.shadcn h3, #root.shadcn h4,
  #root.shadcn h5, #root.shadcn h6, #root.shadcn li {
    color: #09090b;
  }

  /* Button style */
  #root.shadcn button {
    font-weight: 500 !important;
    font-size: 14px !important;
  }

  /* Dense Shadcn — Linear-style data density */

  /* Tighter base font */
  #root.shadcn p, #root.shadcn div, #root.shadcn span,
  #root.shadcn label, #root.shadcn li, #root.shadcn td, #root.shadcn th {
    font-size: 13px !important;
  }

  /* Compact row heights */
  #root.shadcn [class*="group/row"],
  #root.shadcn [class*="h-10"], #root.shadcn [class*="h-9"],
  #root.shadcn [class*="h-14"] {
    min-height: 32px !important;
    height: auto !important;
  }

  /* Tighter list/nav item padding */
  #root.shadcn [class*="group/row"] {
    padding-top: 4px !important;
    padding-bottom: 4px !important;
  }
  #root.shadcn [class*="px-2xl"] {
    padding-left: 12px !important;
    padding-right: 12px !important;
  }
  #root.shadcn [class*="py-lg"], #root.shadcn [class*="py-md"] {
    padding-top: 4px !important;
    padding-bottom: 4px !important;
  }
  #root.shadcn [class*="gap-md"] { gap: 6px !important; }
  #root.shadcn [class*="gap-lg"] { gap: 8px !important; }
  #root.shadcn [class*="gap-2xl"] { gap: 12px !important; }

  /* Compact inputs */
  #root.shadcn input, #root.shadcn select {
    height: 28px !important;
    font-size: 13px !important;
    padding: 0 10px !important;
  }

  /* Compact buttons */
  #root.shadcn button {
    font-size: 13px !important;
    padding-top: 4px !important;
    padding-bottom: 4px !important;
  }

  /* Table rows */
  #root.shadcn [class*="border-b border-border"] td,
  #root.shadcn [class*="h-12"] {
    height: 32px !important;
    padding-top: 4px !important;
    padding-bottom: 4px !important;
  }

  /* Section headers / group labels */
  #root.shadcn [class*="text-small"],
  #root.shadcn [class*="text-h3"] {
    font-size: 11px !important;
  }

  /* L1/L2 nav — regular weight for all items except selected */
  #root.shadcn [class*="group/row"] *,
  #root.shadcn [class*="group/row"] {
    font-weight: 400 !important;
  }
  #root.shadcn [class*="group/row"][class*="selected"] *,
  #root.shadcn [class*="group/row"][class*="active"] *,
  #root.shadcn [class*="group/row"][class*="selected"],
  #root.shadcn [class*="group/row"][class*="active"] {
    font-weight: 500 !important;
  }

  /* Input style */
  #root.shadcn input, #root.shadcn textarea, #root.shadcn select {
    border-color: #e4e4e7 !important;
    background: #fff !important;
  }
  #root.shadcn input:focus, #root.shadcn textarea:focus, #root.shadcn select:focus {
    border-color: #1976d2 !important;
    box-shadow: 0 0 0 3px rgba(25,118,210,.15) !important;
    outline: none !important;
  }
</style>
</head>
<body>

<!-- Birdeye nav bar -->
<nav class="nav">
  <div class="nav-title">Shadcn for Birdeye</div>
  <span class="nav-tag">Live Prototype</span>
  <span class="nav-badge">MYNA · Automotive</span>
  <div class="nav-divider"></div>
  <div class="ds-toggle">
    <button class="ds-toggle-btn active" id="btn-aero" onclick="setMode('aero')">Aero</button>
    <button class="ds-toggle-btn" id="btn-shadcn" onclick="setMode('shadcn')">Shadcn</button>
  </div>
  <a href="aero-foundations.html" class="back-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Go back to Components
  </a>
</nav>

<!-- MYNA Automotive React app -->
<div id="root"></div>

<!-- MYNA Automotive app bundle -->
<script type="module" crossorigin src="https://hareshrajamannar-creator.github.io/MYNA-Automotive/assets/index-BqQcQIrc.js"></script>

<script>
function setMode(mode) {
  const root = document.getElementById('root');
  const btnAero = document.getElementById('btn-aero');
  const btnShadcn = document.getElementById('btn-shadcn');
  if (mode === 'shadcn') {
    root.classList.add('shadcn');
    btnShadcn.classList.add('active');
    btnAero.classList.remove('active');
  } else {
    root.classList.remove('shadcn');
    btnAero.classList.add('active');
    btnShadcn.classList.remove('active');
  }
}
</script>

</body>
</html>
