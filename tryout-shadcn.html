<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tryout Shadcn for Birdeye — MYNA Automotive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- MYNA Automotive app styles -->
<link rel="stylesheet" crossorigin href="https://hareshrajamannar-creator.github.io/MYNA-Automotive/assets/index-JzOD8i5E.css">

<!-- Design system shared styles -->
<link rel="stylesheet" href="ds-aero.css">
<link rel="stylesheet" href="ds-shadcn.css">

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;min-height:100vh;background:#f0f2f5;}

  /* Nav bar */
  .nav{display:flex;align-items:center;gap:10px;padding:0 24px;height:52px;background:linear-gradient(90deg,#1565c0 0%,#1976d2 100%);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18);position:sticky;top:0;z-index:999;}
  .nav-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em;}
  .nav-tag{background:rgba(255,255,255,.15);color:#fff;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .nav-badge{background:#18181b;color:#fafafa;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .nav-divider{width:1px;height:20px;background:rgba(255,255,255,.25);margin:0 4px;}
  .back-btn{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);color:#fff;font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;text-decoration:none;border:1.5px solid rgba(255,255,255,.3);white-space:nowrap;transition:background .15s;}
  .back-btn:hover{background:rgba(255,255,255,.22);}

  /* Toggle */
  .ds-toggle{display:flex;align-items:center;background:rgba(0,0,0,.2);border-radius:8px;padding:3px;gap:2px;}
  .ds-toggle-btn{font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:600;padding:4px 12px;border-radius:6px;border:none;cursor:pointer;transition:background .15s,color .15s;background:transparent;color:rgba(255,255,255,.65);}
  .ds-toggle-btn.active{background:#fff;color:#1565c0;}

  /* App mount */
  #root{flex:1;}
</style>
</head>
<body>

<!-- Birdeye nav bar -->
<nav class="nav">
  <div class="nav-title">Shadcn for Birdeye</div>
  <span class="nav-tag">Live Prototype</span>
  <span class="nav-badge">MYNA · Automotive</span>
  <div class="nav-divider"></div>
  <div class="ds-toggle">
    <button class="ds-toggle-btn" id="btn-aero" onclick="DS.setMode('aero')">Aero</button>
    <button class="ds-toggle-btn" id="btn-shadcn" onclick="DS.setMode('shadcn')">Shadcn</button>
  </div>
  <a href="aero-foundations.html" class="back-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Go back to Components
  </a>
</nav>

<!-- MYNA Automotive React app -->
<div id="root"></div>

<!-- MYNA Automotive app bundle -->
<script type="module" crossorigin src="https://hareshrajamannar-creator.github.io/MYNA-Automotive/assets/index-D6d9t3jo.js"></script>

<!-- Shared DS toggle — defaults to aero -->
<script src="ds-toggle.js" data-root="root" data-default="aero"></script>

<script>
// Find the nearest clickable ancestor of a text node
function nearestClickable(el, maxDepth) {
  let node = el;
  for (let i = 0; i < maxDepth; i++) {
    node = node.parentElement;
    if (!node || node.id === 'root') break;
    const tag = node.tagName;
    if (tag === 'A' || tag === 'BUTTON' || node.getAttribute('role') === 'button' || node.tabIndex >= 0) return node;
  }
  return null;
}

// Hide Agents from L1
function hideAgents() {
  const spans = document.querySelectorAll('#root span, #root a');
  for (const el of spans) {
    if (el.childElementCount === 0 && el.textContent.trim() === 'Agents') {
      const row = nearestClickable(el, 6);
      if (row) { row.style.cssText += 'display:none!important'; return true; }
    }
  }
  return false;
}

// Rename "Patients" → "Contacts" in L1 and wire click to contacts.html
function patchContactsNav() {
  const allText = document.querySelectorAll('#root span, #root div, #root a');
  for (const el of allText) {
    if (el.childElementCount === 0 && el.textContent.trim() === 'Patients') {
      el.textContent = 'Contacts';
      if (el.hasAttribute('title')) el.setAttribute('title', 'Contacts');
      if (el.hasAttribute('aria-label')) el.setAttribute('aria-label', 'Contacts');
      const btn = nearestClickable(el, 6);
      if (btn) {
        btn.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          window.location.href = 'contacts.html';
        }, true);
      }
      return true;
    }
  }
  // Fallback: patch by aria-label/title containing "Patients"
  const allBtns = document.querySelectorAll('#root button, #root a');
  for (const btn of allBtns) {
    const lbl = (btn.getAttribute('aria-label') || btn.getAttribute('title') || '').trim();
    if (lbl === 'Patients') {
      btn.setAttribute('aria-label', 'Contacts');
      btn.setAttribute('title', 'Contacts');
      btn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        window.location.href = 'contacts.html';
      }, true);
      return true;
    }
  }
  return false;
}

let _attempts = 0;
let _contactsPatched = false;
const _poll = setInterval(() => {
  const agentsDone = hideAgents();
  if (!_contactsPatched) _contactsPatched = patchContactsNav();
  if ((agentsDone || _attempts > 10) && (_contactsPatched || _attempts > 30)) clearInterval(_poll);
  _attempts++;
}, 200);
</script>

</body>
</html>
