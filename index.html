<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Akhil's Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Roboto',sans-serif;
  background:var(--ds-color-bg-page);
  min-height:100vh;
  color:var(--ds-color-text-primary);
}

/* ── HEADER ── */
.header{
  padding:40px 48px 0;
  display:flex;
  align-items:center;
  gap:14px;
}
.header-logo svg{display:block}
.header-title{
  font-size:22px;
  font-weight:400;
  letter-spacing:-0.44px;
  color:var(--ds-color-text-primary);
}

/* ── GRID ── */
.grid{
  padding:40px 48px 48px;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
}

/* ── CARD ── */
.card{
  background:var(--ds-color-bg-surface);
  border:1px solid var(--ds-color-border);
  border-radius:var(--ds-radius-lg);
  width:280px;
  overflow:hidden;
  box-shadow:var(--ds-shadow-card);
  display:flex;
  flex-direction:column;
  transition:box-shadow 0.15s, border-color 0.15s;
}
.card:hover{
  box-shadow:0 4px 16px rgba(0,0,0,0.10);
  border-color:var(--ds-color-border-input);
}

.card-thumb{
  height:148px;
  background:var(--ds-color-rail-bg);
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid var(--ds-color-border);
  overflow:hidden;
}
.card-thumb-l4{background:linear-gradient(135deg,#e5e9f0 0%,#c7d6f6 100%)}
.card-thumb-billing{background:linear-gradient(135deg,#e5e9f0 0%,#dbeafe 100%)}
.card-thumb svg{opacity:0.5}

.card-body{
  padding:16px 18px 18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  flex:1;
}
.card-name{
  font-size:15px;
  font-weight:500;
  letter-spacing:-0.3px;
  color:var(--ds-color-text-primary);
}
.card-meta{
  font-size:12px;
  color:var(--ds-color-text-muted);
  letter-spacing:0;
  display:flex;
  align-items:center;
  gap:5px;
}
.card-meta svg{flex-shrink:0}

.card-footer{
  padding:0 18px 18px;
}
.view-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 14px;
  border-radius:var(--ds-radius-sm);
  border:1px solid var(--ds-color-blue-100);
  background:transparent;
  font-size:13px;
  font-weight:500;
  letter-spacing:-0.26px;
  color:var(--ds-color-blue-100);
  cursor:pointer;
  text-decoration:none;
  font-family:'Roboto',sans-serif;
  transition:background 0.15s, color 0.15s;
}
.view-btn:hover{
  background:var(--ds-color-blue-100);
  color:#fff;
}
.view-btn svg{transition:stroke 0.15s}
.view-btn:hover svg{stroke:#fff}
</style>
</head>
