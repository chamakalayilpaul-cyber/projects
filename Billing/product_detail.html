<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product Detail – Billing and usage</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0&display=block"/>
<link rel="stylesheet" href="../ds-tokens.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Roboto',sans-serif;
  background:rgb(242,242,242);
  height:100vh;
  overflow:hidden;
  color:rgb(33,33,33);
  font-size:14px;
  font-weight:400;
  line-height:20px;
  letter-spacing:-0.28px;
}

/* ── LAYOUT ── */
.body-wrap{display:flex;height:100vh;overflow:hidden}

/* ── RAIL (L1) ── */
.rail{
  width:56px;
  background:#e5e9f0;
  border-right:1px solid #eaeaea;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  flex-shrink:0;
}
.rail-logo-area{
  height:52px;
  background:#e5e9f0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.rail-nav{
  flex:1;
  background:#e5e9f0;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:8px 14px;
  gap:8px;
  overflow:hidden;
}
.rail-btn{
  width:28px;height:28px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;position:relative;border:none;background:transparent;
}
.rail-btn:hover{background:rgba(0,0,0,0.06)}
.rail-btn.active{background:#c7d6f6}
.rail-btn .material-symbols-rounded{font-size:20px;color:rgb(48,48,48);user-select:none}
.rail-divider{width:20px;height:1px;background:#c0c8d8;flex-shrink:0;margin:0 auto}

/* ── SIDEBAR (L2) ── */
.sidebar{
  width:222px;
  background:#fafafa;
  border-right:1px solid #eaeaea;
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  overflow:hidden;
}
.sb-title{
  height:52px;
  background:#fafafa;
  display:flex;
  align-items:center;
  padding:15px 24px;
  font-size:18px;
  font-weight:400;
  color:#212121;
  flex-shrink:0;
}
.sb-body{
  flex:1;
  overflow-y:auto;
  padding:8px 16px;
  display:flex;
  flex-direction:column;
  gap:0;
}
.sb-group-hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:4px 8px;
  height:32px;
  cursor:pointer;
  font-size:14px;
  color:#212121;
  border-radius:4px;
}
.sb-group-hdr:hover{background:rgba(0,0,0,0.04)}
.sb-group-hdr svg{flex-shrink:0;color:#555}
.sb-item{
  display:flex;
  align-items:center;
  padding:4px 8px;
  height:32px;
  cursor:pointer;
  font-size:14px;
  color:#212121;
  border-radius:4px;
}
.sb-item:hover{background:#F3F4F7}
.sb-item.active{background:#E5E9F1}

/* ── TOP NAV ── */
.top-nav{
  height:52px;
  background:#ffffff;
  border-bottom:1px solid #e9e9eb;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:12px 24px;
  gap:4px;
  flex-shrink:0;
}
.top-nav-btn{
  width:28px;
  height:28px;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:4px;
  flex-shrink:0;
}
.top-nav-btn:hover{background:rgba(0,0,0,0.06)}
.top-nav-btn img{width:20px;height:20px;display:block}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── BREADCRUMB ── */
.breadcrumb-bar{
  height:52px;
  display:flex;
  align-items:center;
  padding:0 24px;
  flex-shrink:0;
}
.breadcrumb{display:flex;align-items:center;gap:2px}
.breadcrumb-link{
  font-size:14px;
  color:rgb(25,118,210);
  cursor:pointer;
  padding:4px 6px;
  border-radius:4px;
  text-decoration:none;
}
.breadcrumb-link:hover{text-decoration:underline}
.breadcrumb-sep{display:flex;align-items:center;color:#bbb}
.breadcrumb-current{
  font-size:14px;
  color:#212121;
  padding:4px 6px;
}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:0 24px 24px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}

/* ── PAGE HEADER ── */
.page-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 0 16px;
}
.page-title{font-size:18px;font-weight:400;color:#212121;letter-spacing:-0.36px}
.page-header-right{display:flex;align-items:center;gap:8px}
.date-label{font-size:12px;color:#8f8f8f}
.icon-btn{
  width:28px;height:28px;border-radius:4px;border:1px solid #eaeaea;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:#fff;color:#555;
}
.icon-btn:hover{background:rgb(242,244,247)}

/* ── SUMMARY CARDS ── */
.summary-row{display:flex;gap:16px;margin-bottom:16px}
.summary-card{
  flex:1;
  background:#fff;
  border:1px solid #eaeaea;
  border-radius:8px;
  padding:20px 24px;
}
.summary-card-label{font-size:12px;color:#8f8f8f;margin-bottom:8px}
.summary-card-value{font-size:28px;font-weight:400;color:#212121;letter-spacing:-0.5px;line-height:1.1;margin-bottom:4px}
.summary-card-value .denom{font-size:16px;color:#8f8f8f;font-weight:400}
.usage-bar-track{height:6px;background:#f0f0f0;border-radius:3px;margin-top:10px}
.usage-bar-fill{height:6px;border-radius:3px;background:#1976d2}
.usage-pct{font-size:12px;color:#8f8f8f;margin-top:6px}

/* ── CHART CARDS ── */
.chart-card{
  background:#fff;
  border:1px solid #eaeaea;
  border-radius:8px;
  padding:20px 24px;
  margin-bottom:16px;
}
.chart-card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.chart-card-title{font-size:14px;font-weight:400;color:#212121}
.chart-card-right{display:flex;align-items:center;gap:8px}
.last-month-btn{
  font-family:'Roboto',sans-serif;
  font-size:12px;
  color:#555;
  background:#fff;
  border:1px solid #eaeaea;
  border-radius:4px;
  padding:4px 10px;
  cursor:pointer;
  white-space:nowrap;
}
.last-month-btn:hover{background:rgb(242,244,247)}
.chart-legend{
  display:flex;
  align-items:center;
  gap:20px;
  margin-top:12px;
  flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#555}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>

<script>
// Read product name from URL param
const params = new URLSearchParams(window.location.search);
const productName = params.get('product') || 'Product';
document.getElementById('bc-product').textContent = productName;
document.getElementById('page-product-name').textContent = productName;
document.title = productName + ' – Billing and usage';

// ── USAGE CHART (stacked bar) ──
const usageCtx = document.getElementById('usageChart').getContext('2d');
new Chart(usageCtx, {
  type: 'bar',
  data: {
    labels: ['Jun 2025', 'Jul 2025', 'Aug 2025', 'Sep 2025', 'Oct 2025', 'Nov 2025'],
    datasets: [
      {
        label: 'Used',
        data: [28000, 30100, 29500, 31200, 30800, 31420],
        backgroundColor: '#1976d2',
        borderRadius: 2,
        stack: 'usage',
      },
      {
        label: 'Purchased',
        data: [22000, 19900, 20500, 18800, 19200, 18580],
        backgroundColor: '#e5e9f0',
        borderRadius: 2,
        stack: 'usage',
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toLocaleString()
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { family: 'Roboto', size: 11 }, color: '#8f8f8f' },
        border: { display: false }
      },
      y: {
        stacked: true,
        grid: { color: '#f0f0f0' },
        ticks: {
          font: { family: 'Roboto', size: 11 },
          color: '#8f8f8f',
          callback: v => (v >= 1000 ? (v/1000).toFixed(0) + 'K' : v)
        },
        border: { display: false }
      }
    }
  }
});
</script>
